<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>综合收益计算器 - 银行专用版</title>
    <style>
        :root {
            --primary: #2c5282;
            --primary-light: #3182ce;
            --secondary: #dd6b20;
            --bg-light: #f7fafc;
            --bg-white: #ffffff;
            --text-dark: #1a202c;
            --text-gray: #4a5568;
            --text-light: #718096;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --success-bg: #e6fffa;
            --success-border: #38b2ac;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft Yahei", sans-serif;
        }

        body {
            background-color: var(--bg-light);
            padding: 12px;
            min-height: 100vh;
            font-size: 14px;
        }

        .calculator {
            max-width: 100%;
            width: 100%;
            background: var(--bg-white);
            padding: 20px 15px;
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            position: relative;
            overflow: hidden;
            margin: 0 auto;
        }

        .calculator::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--primary-light));
        }

        h1 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 15px;
            font-size: 20px;
            font-weight: 600;
            position: relative;
            padding-bottom: 10px;
        }

        h1::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 2px;
            background: var(--primary-light);
            border-radius: 2px;
        }

        .tab-container {
            display: flex;
            margin-bottom: 15px;
            border-radius: 8px;
            background-color: var(--bg-light);
            overflow: hidden;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background-color: transparent;
            border: none;
            color: var(--text-gray);
            font-size: 15px;
            font-weight: 500;
            margin-top: 0;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-container {
            transition: all 0.5s ease;
            max-height: 1000px;
        }

        .form-container.collapsed {
            max-height: 0;
            overflow: hidden;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .form-group {
            margin-bottom: 12px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: var(--text-gray);
            font-weight: 500;
            font-size: 15px;
        }

        input, select {
            width: 100%;
            padding: 12px 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
            color: var(--text-dark);
            transition: all 0.3s ease;
            background-color: var(--bg-white);
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary-light);
            box-shadow: 0 0 0 2px rgba(49, 130, 206, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow);
        }

        .result {
            margin-top: 15px;
            padding: 20px 15px;
            background-color: rgba(49, 130, 206, 0.05);
            border-radius: 10px;
            display: none;
            border: 1px solid rgba(49, 130, 206, 0.1);
            flex-direction: column;
        }

        .result h2 {
            font-size: 18px;
            color: var(--primary);
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(49, 130, 206, 0.15);
            font-weight: 600;
        }

        .input-summary {
            background-color: rgba(255, 255, 255, 0.8);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        .input-summary h3 {
            font-size: 15px;
            color: var(--text-gray);
            margin-bottom: 10px;
            font-weight: 600;
        }

        .input-row {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            font-size: 15px;
        }

        .result-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px 10px;
            margin-bottom: 20px;
        }

        .result-item {
            display: flex;
            flex-direction: column;
            padding: 10px 8px;
            background-color: rgba(255, 255, 255, 0.6);
            border-radius: 6px;
        }

        .result-label {
            color: var(--text-light);
            font-size: 14px;
            margin-bottom: 4px;
        }

        .result-value {
            color: var(--text-dark);
            font-weight: 600;
            font-size: 16px;
        }

        .total-container {
            grid-column: 1 / -1;
            padding-top: 15px;
            border-top: 2px solid rgba(49, 130, 206, 0.1);
            margin-top: 10px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .total-item {
            text-align: center;
            padding: 10px;
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 8px;
        }

        .highlight {
            color: var(--secondary);
            font-size: 18px;
            font-weight: 700;
        }

        .dual-plan-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 10px;
        }

        .plan-card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            border-left: 4px solid var(--primary-light);
            box-shadow: var(--shadow);
        }

        .plan-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 12px;
            background: #ebf8ff;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
        }

        .back-btn {
            background: linear-gradient(135deg, #718096, #4a5568);
            margin-top: 15px;
            display: none;
        }

        .disclaimer {
            margin-top: 15px;
            text-align: center;
            font-size: 13px;
            color: var(--text-light);
            padding: 8px 0;
        }

        @media (max-width: 375px) {
            body { padding: 8px; }
            .calculator { padding: 15px 10px; }
            .result { padding: 15px 10px; }
        }
    </style>
</head>
<body>
    <div class="calculator">
        <h1>综合收益计算器</h1>
        
        <div class="tab-container">
            <button class="tab-btn active" data-tab="deposit">存款计算器</button>
            <button class="tab-btn" data-tab="finance">理财计算器</button>
        </div>
        
        <!-- 存款计算器Tab -->
        <div class="tab-content active" id="deposit">
            <div class="form-container" id="depositFormContainer">
                <div class="form-group">
                    <label for="amount">存款金额（元）</label>
                    <input type="number" id="amount" placeholder="请输入存款金额" min="10000" required>
                </div>
                <div class="form-group">
                    <label for="period">存款期限</label>
                    <select id="period" required>
                        <option value="1">一年期</option>
                        <option value="3">三年期</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="customerLevel">客户级别</label>
                    <select id="customerLevel" required>
                        <option value="normal">普通客户</option>
                        <option value="vip">贵宾客户</option>
                        <option value="gold">黄金客户</option>
                        <option value="platinum">白金客户</option>
                        <option value="diamond">钻石客户</option>
                        <option value="private">私行客户</option>
                    </select>
                </div>
                <button id="calculateDepositBtn">计算综合收益</button>
            </div>
            
            <!-- 存款结果容器（动态渲染） -->
            <div class="result" id="depositResult"></div>
        </div>
        
        <!-- 理财计算器Tab（保持不变） -->
        <div class="tab-content" id="finance">
            <div class="form-container" id="financeFormContainer">
                <div class="form-group">
                    <label for="financeAmount">理财购买金额（元）</label>
                    <input type="number" id="financeAmount" placeholder="例如：100000" min="1000" required>
                </div>
                <div class="form-group">
                    <label for="financeDays">理财期限（天）</label>
                    <input type="number" id="financeDays" placeholder="例如：90" min="1" required>
                </div>
                <div class="form-group">
                    <label for="financeRate">预计年化收益率（%）</label>
                    <input type="number" id="financeRate" placeholder="例如：3.5" min="0.01" step="0.01" required>
                </div>
                <button id="calculateFinanceBtn">计算理财收益</button>
            </div>
            <div class="result" id="financeResult">
                <div class="result-content">
                    <h2>理财计算结果</h2>
                    <div class="input-summary" id="financeInputSummary"></div>
                    <div class="result-grid" id="financeResultGrid"></div>
                </div>
                <div class="result-footer">
                    <button class="back-btn" id="financeBackBtn">返回重新计算</button>
                    <div class="disclaimer">*仅限内部使用，结果仅供参考*</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ======================== 利率配置（保持不变） ========================
        const customerConfig = {
            normal: { name: '普通客户', rate1: 1.4, rate3: 1.8 },
            vip: { name: '贵宾客户', rate1: 1.4, rate3: 1.8 },
            gold: { name: '黄金客户', rate1: 1.4, rate3: 1.8 },
            platinum: { name: '白金客户', rate1: 1.4, rate3: 1.8 },
            diamond: { name: '钻石客户', rate1: 1.4, rate3: 1.8 },
            private: { name: '私行客户', rate1: 1.4, rate3: 1.8 }
        };

        // 积分回馈规则（每万元秦贝数，仅返积分场景使用）
        function getQinbeiPerWan(amount) {
            if (amount >= 10000 && amount < 50000) return 1080;
            if (amount >= 50000 && amount < 200000) return 1440;
            if (amount >= 200000 && amount < 500000) return 1620;
            if (amount >= 500000) return 1800;
            return 0;
        }

        // 一年期 账户级政策（门槛、返现每万元、是否返积分）
        function getAccountLevelPolicy1Y(amount) {
            if (amount >= 20000000) return { rewardPerWan: 45, hasPoints: false };     // 2000万+
            if (amount >= 5000000) return { rewardPerWan: 40, hasPoints: false };      // 500万+
            if (amount >= 3000000) return { rewardPerWan: 35, hasPoints: false };      // 300万+
            if (amount >= 500000) return { rewardPerWan: 30, hasPoints: true };        // 50万+
            if (amount >= 100000) return { rewardPerWan: 15, hasPoints: true };        // 10万+
            return null; // 不满足账户级
        }

        // 一年期 客户级政策（白金/钻石 / 私行特殊处理）
        function getCustomerLevelPolicy1Y(level, amount) {
            if (level === 'platinum' || level === 'diamond') {
                return { rewardPerWan: 30, hasPoints: true };   // 白金钻石客户级返30，返积分
            }
            return null;
        }

        // 三年期政策（账户级 + 客户级，均不返积分）
        function getPolicy3Y(amount, level) {
            // 账户级：单笔200万(含)以上返15；300万以上返30
            if (amount >= 3000000) return { rewardPerWan: 30, hasPoints: false };
            if (amount >= 2000000) return { rewardPerWan: 15, hasPoints: false };
            // 客户级：私行客户不论金额（参考政策私行返30元/万，不返积分）
            if (level === 'private') {
                return { rewardPerWan: 30, hasPoints: false };
            }
            // 其他客户无返现
            return { rewardPerWan: 0, hasPoints: false };
        }

        // 核心：获取存款方案（非私行一年期或三年期单一方案）
        function getSingleDepositPlan(amount, period, level) {
            if (period === 1) { // 一年期
                // 优先账户级
                let accountPolicy = getAccountLevelPolicy1Y(amount);
                if (accountPolicy) {
                    return { rewardPerWan: accountPolicy.rewardPerWan, hasPoints: accountPolicy.hasPoints };
                }
                // 无账户级则看客户级（白金/钻石）
                let customerPolicy = getCustomerLevelPolicy1Y(level, amount);
                if (customerPolicy) {
                    return { rewardPerWan: customerPolicy.rewardPerWan, hasPoints: customerPolicy.hasPoints };
                }
                // 默认无返现无积分
                return { rewardPerWan: 0, hasPoints: false };
            } 
            else if (period === 3) {
                return getPolicy3Y(amount, level);
            }
            return { rewardPerWan: 0, hasPoints: false };
        }

        // 私行一年期双方案：方案A（返积分政策） & 方案B（不返积分政策）
        function getPrivateDoublePlans(amount) {
            // 根据Excel私行一年期两种情景：
            // 返积分方案: 每万元返现30，享受积分回馈
            // 不返积分方案: 每万元返现35，无积分回馈
            return {
                planWithPoints: { rewardPerWan: 30, hasPoints: true, planName: "私行专享·返积分方案" },
                planWithoutPoints: { rewardPerWan: 35, hasPoints: false, planName: "私行专享·不返积分方案" }
            };
        }

        // 计算基础利息
        function calcBaseInterest(amount, period, level) {
            let rate = 0;
            if (period === 1) rate = customerConfig[level].rate1 / 100;
            else if (period === 3) rate = customerConfig[level].rate3 / 100;
            else rate = 0;
            return amount * rate * period;
        }

        // 计算积分回馈收益 (activity1)
        function calcPointsProfit(amount, hasPoints) {
            if (!hasPoints) return 0;
            const tenThousand = amount / 10000;
            const qinbeiPerWan = getQinbeiPerWan(amount);
            const totalQinbei = tenThousand * qinbeiPerWan;
            return totalQinbei / 100;   // 秦贝/100 = 现金价值
        }

        // 计算资产提升返现 (activity2)
        function calcRewardProfit(amount, rewardPerWan) {
            const tenThousand = amount / 10000;
            return tenThousand * rewardPerWan;
        }

        // 渲染存款结果（支持单方案或双方案）
        function renderDepositResult(amount, period, level, periodName, levelName, baseInterest, singlePlan, doublePlans = null) {
            const resultDiv = document.getElementById('depositResult');
            if (!resultDiv) return;
            
            // 格式化数字
            const formatMoney = (val) => val.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            const formatPercent = (val) => val.toFixed(4) + '%';
            
            // 公共头部：输入摘要 + 基础利率信息
            let baseRateValue = (period === 1 ? customerConfig[level].rate1 : customerConfig[level].rate3);
            const inputSummaryHtml = `
                <div class="input-summary">
                    <h3>输入信息</h3>
                    <div class="input-row"><span class="input-label">存款金额：</span><span class="input-value">${formatMoney(amount)} 元</span></div>
                    <div class="input-row"><span class="input-label">存款期限：</span><span class="input-value">${periodName}</span></div>
                    <div class="input-row"><span class="input-label">客户级别：</span><span class="input-value">${levelName}</span></div>
                    <div class="input-row"><span class="input-label">存款年利率：</span><span class="input-value">${baseRateValue}%</span></div>
                </div>
            `;
            
            // 生成单个方案卡片
            function buildPlanCard(plan, planTitle, extraClass = "") {
                const profitPoints = calcPointsProfit(amount, plan.hasPoints);
                const profitReward = calcRewardProfit(amount, plan.rewardPerWan);
                const totalProfit = baseInterest + profitPoints + profitReward;
                const totalRate = (totalProfit / amount / period) * 100;
                const qinbeiValue = plan.hasPoints ? (amount/10000 * getQinbeiPerWan(amount)).toFixed(0) : "0";
                
                return `
                    <div class="plan-card" style="${extraClass}">
                        <div class="plan-title">${planTitle}</div>
                        <div class="result-grid">
                            <div class="result-item"><span class="result-label">存款本金（元）</span><span class="result-value">${formatMoney(amount)}</span></div>
                            <div class="result-item"><span class="result-label">存款利息（元）</span><span class="result-value">${formatMoney(baseInterest)}</span></div>
                            <div class="result-item"><span class="result-label">积分回馈活动（元）</span><span class="result-value">${formatMoney(profitPoints)}</span></div>
                            <div class="result-item"><span class="result-label">资产提升返现（元）</span><span class="result-value">${formatMoney(profitReward)}</span></div>
                            <div class="result-item"><span class="result-label">每万元积分(秦贝)</span><span class="result-value">${plan.hasPoints ? getQinbeiPerWan(amount) : "0"} 秦贝</span></div>
                            <div class="result-item"><span class="result-label">每万元返现(元)</span><span class="result-value">${plan.rewardPerWan.toFixed(2)} 元</span></div>
                            <div class="total-container">
                                <div class="total-item"><span class="result-label">总收益（元）</span><span class="result-value highlight">${formatMoney(totalProfit)}</span></div>
                                <div class="total-item"><span class="result-label">综合年利率</span><span class="result-value highlight">${formatPercent(totalRate)}</span></div>
                            </div>
                        </div>
                        ${plan.hasPoints ? `<div style="font-size:12px; color:#2c5282; margin-top:8px;">✨ 含积分回馈：累计 ${qinbeiValue} 秦贝 (100秦贝=1元)</div>` : `<div style="font-size:12px; color:#718096;">※ 本方案不享受积分回馈</div>`}
                    </div>
                `;
            }
            
            let contentHtml = `<h2>存款计算结果</h2>${inputSummaryHtml}`;
            
            if (doublePlans && period === 1 && level === 'private') {
                // 私行一年期：显示双方案对比
                contentHtml += `<div class="dual-plan-container">
                    ${buildPlanCard(doublePlans.planWithPoints, doublePlans.planWithPoints.planName)}
                    ${buildPlanCard(doublePlans.planWithoutPoints, doublePlans.planWithoutPoints.planName)}
                </div>`;
            } else {
                // 普通单方案
                const displayName = (period === 1 ? "一年期标准方案" : "三年期标准方案");
                contentHtml += buildPlanCard(singlePlan, displayName);
            }
            
            // 完整渲染
            resultDiv.innerHTML = `
                <div class="result-content">${contentHtml}</div>
                <div class="result-footer">
                    <button class="back-btn" id="depositBackBtn" style="display:block;">返回重新计算</button>
                    <div class="disclaimer">*依据2026年4月8日存款政策(域内)测算，结果仅供参考*</div>
                </div>
            `;
            resultDiv.style.display = 'flex';
            
            // 绑定返回按钮事件
            const backBtn = document.getElementById('depositBackBtn');
            if (backBtn) {
                backBtn.addEventListener('click', () => resetDepositCalculator());
            }
        }
        
        // 存款主逻辑
        function calculateDepositProfit() {
            const amount = parseFloat(document.getElementById('amount').value);
            const period = parseInt(document.getElementById('period').value);
            const customerLevel = document.getElementById('customerLevel').value;
            const levelName = customerConfig[customerLevel].name;
            
            let periodName = period === 1 ? "一年期" : "三年期";
            
            if (isNaN(amount) || amount < 10000) {
                alert('存款金额不能低于1万元，请重新输入！');
                return;
            }
            
            // 基础利息
            const baseInterest = calcBaseInterest(amount, period, customerLevel);
            
            // 处理私行一年期双方案逻辑
            if (period === 1 && customerLevel === 'private') {
                const doublePlans = getPrivateDoublePlans(amount);
                // 渲染双方案（同时展示返积分和不返积分）
                renderDepositResult(amount, period, customerLevel, periodName, levelName, baseInterest, null, doublePlans);
                // 隐藏表单区域
                document.getElementById('depositFormContainer').classList.add('collapsed');
                // 平滑滚动
                document.getElementById('depositResult').scrollIntoView({ behavior: 'smooth' });
                return;
            }
            
            // 普通单方案（非私行一年期 或 三年期任何客户）
            const singlePlan = getSingleDepositPlan(amount, period, customerLevel);
            // 附加校验：三年期若返现为0但金额较高政策空缺属于正常
            renderDepositResult(amount, period, customerLevel, periodName, levelName, baseInterest, singlePlan, null);
            document.getElementById('depositFormContainer').classList.add('collapsed');
            document.getElementById('depositResult').scrollIntoView({ behavior: 'smooth' });
        }
        
        // 重置存款计算器
        function resetDepositCalculator() {
            const formContainer = document.getElementById('depositFormContainer');
            const resultDiv = document.getElementById('depositResult');
            formContainer.classList.remove('collapsed');
            resultDiv.style.display = 'none';
            resultDiv.innerHTML = '';    // 清空动态内容
            // 清空输入
            document.getElementById('amount').value = '';
            document.getElementById('period').value = '1';
            document.getElementById('customerLevel').value = 'normal';
            formContainer.scrollIntoView({ behavior: 'smooth' });
        }
        
        // ======================== 理财计算器（完全保留原逻辑，只优化展示） ========================
        function calculateFinanceProfit() {
            const amount = parseFloat(document.getElementById('financeAmount').value);
            const days = parseInt(document.getElementById('financeDays').value);
            const rate = parseFloat(document.getElementById('financeRate').value);
            
            if (isNaN(amount) || amount < 1000) { alert('理财购买金额不能低于1000元'); return; }
            if (isNaN(days) || days < 1) { alert('理财期限不能少于1天'); return; }
            if (isNaN(rate) || rate <= 0) { alert('年化收益率必须大于0'); return; }
            
            const dailyRate = rate / 100 / 365;
            const dailyProfit = amount * dailyRate;
            const totalProfit = amount * dailyRate * days;
            const totalAmount = amount + totalProfit;
            const formatOpt = { minimumFractionDigits: 2, maximumFractionDigits: 2 };
            
            // 构建摘要和结果
            const summaryHtml = `
                <h3>输入信息</h3>
                <div class="input-row"><span class="input-label">理财购买金额：</span><span class="input-value">${amount.toLocaleString('zh-CN', formatOpt)} 元</span></div>
                <div class="input-row"><span class="input-label">理财期限：</span><span class="input-value">${days} 天</span></div>
                <div class="input-row"><span class="input-label">预计年化收益率：</span><span class="input-value">${rate}%</span></div>
            `;
            const resultGridHtml = `
                <div class="result-item"><span class="result-label">理财本金（元）</span><span class="result-value">${amount.toLocaleString('zh-CN', formatOpt)}</span></div>
                <div class="result-item"><span class="result-label">理财期限（天）</span><span class="result-value">${days} 天</span></div>
                <div class="result-item"><span class="result-label">预计年化收益率</span><span class="result-value">${rate}%</span></div>
                <div class="result-item"><span class="result-label">每日收益（元）</span><span class="result-value">${dailyProfit.toLocaleString('zh-CN', formatOpt)}</span></div>
                <div class="total-container">
                    <div class="total-item"><span class="result-label">总利息收益（元）</span><span class="result-value highlight">${totalProfit.toLocaleString('zh-CN', formatOpt)}</span></div>
                    <div class="total-item"><span class="result-label">到期本息合计（元）</span><span class="result-value highlight">${totalAmount.toLocaleString('zh-CN', formatOpt)}</span></div>
                </div>
            `;
            const financeResultDiv = document.getElementById('financeResult');
            financeResultDiv.innerHTML = `
                <div class="result-content">
                    <h2>理财计算结果</h2>
                    <div class="input-summary">${summaryHtml}</div>
                    <div class="result-grid">${resultGridHtml}</div>
                </div>
                <div class="result-footer">
                    <button class="back-btn" id="financeBackBtn" style="display:block;">返回重新计算</button>
                    <div class="disclaimer">*仅限内部使用，结果仅供参考*</div>
                </div>
            `;
            financeResultDiv.style.display = 'flex';
            document.getElementById('financeFormContainer').classList.add('collapsed');
            document.getElementById('financeBackBtn').addEventListener('click', resetFinanceCalculator);
            financeResultDiv.scrollIntoView({ behavior: 'smooth' });
        }
        
        function resetFinanceCalculator() {
            document.getElementById('financeFormContainer').classList.remove('collapsed');
            document.getElementById('financeResult').style.display = 'none';
            document.getElementById('financeResult').innerHTML = '';
            document.getElementById('financeAmount').value = '';
            document.getElementById('financeDays').value = '';
            document.getElementById('financeRate').value = '';
        }
        
        // Tab切换 + 重置全部
        function resetAllCalculators() {
            resetDepositCalculator();
            resetFinanceCalculator();
        }
        
        // 事件绑定
        document.getElementById('calculateDepositBtn').addEventListener('click', calculateDepositProfit);
        document.getElementById('calculateFinanceBtn').addEventListener('click', calculateFinanceProfit);
        
        // Tab切换逻辑
        const tabBtns = document.querySelectorAll('.tab-btn');
        const tabContents = document.querySelectorAll('.tab-content');
        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                tabBtns.forEach(b => b.classList.remove('active'));
                tabContents.forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                const tabId = btn.getAttribute('data-tab');
                document.getElementById(tabId).classList.add('active');
                resetAllCalculators();
            });
        });
        
        // 回车支持
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const activeTab = document.querySelector('.tab-btn.active').getAttribute('data-tab');
                if (activeTab === 'deposit' && !document.getElementById('depositFormContainer').classList.contains('collapsed')) {
                    calculateDepositProfit();
                } else if (activeTab === 'finance' && !document.getElementById('financeFormContainer').classList.contains('collapsed')) {
                    calculateFinanceProfit();
                }
            }
        });
    </script>
</body>
</html>

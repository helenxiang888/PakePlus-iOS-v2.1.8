<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>综合收益计算器</title>
    <style>
        :root {
            --primary: #2c5282;
            --primary-light: #3182ce;
            --secondary: #dd6b20;
            --bg-light: #f7fafc;
            --bg-white: #ffffff;
            --text-dark: #1a202c;
            --text-gray: #4a5568;
            --text-light: #718096;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft Yahei", sans-serif;
        }

        body {
            background-color: var(--bg-light);
            padding: 12px;
            min-height: 100vh;
            font-size: 14px;
        }

        .calculator {
            max-width: 100%;
            width: 100%;
            background: var(--bg-white);
            padding: 20px 15px;
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            position: relative;
            overflow: hidden;
            margin: 0 auto;
        }

        .calculator::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--primary-light));
        }

        h1 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 15px;
            font-size: 20px;
            font-weight: 600;
            position: relative;
            padding-bottom: 10px;
        }

        h1::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 2px;
            background: var(--primary-light);
            border-radius: 2px;
        }

        .form-container {
            transition: all 0.5s ease;
            max-height: 1000px;
        }

        .form-container.collapsed {
            max-height: 0;
            overflow: hidden;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .form-group {
            margin-bottom: 12px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: var(--text-gray);
            font-weight: 500;
            font-size: 15px;
        }

        input, select {
            width: 100%;
            padding: 12px 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
            color: var(--text-dark);
            transition: all 0.3s ease;
            background-color: var(--bg-white);
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary-light);
            box-shadow: 0 0 0 2px rgba(49, 130, 206, 0.1);
        }

        input::placeholder {
            color: var(--text-light);
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow);
            background: linear-gradient(135deg, var(--primary-light), var(--primary));
        }

        button:active {
            transform: translateY(0);
        }

        /* 结果区域默认隐藏 */
        .result {
            margin-top: 15px;
            padding: 20px 15px;
            background-color: rgba(49, 130, 206, 0.05);
            border-radius: 10px;
            display: none;
            border: 1px solid rgba(49, 130, 206, 0.1);
            min-height: 70vh;
            flex-direction: column;
            justify-content: space-between;
        }

        .result h2 {
            font-size: 18px;
            color: var(--primary);
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(49, 130, 206, 0.15);
            font-weight: 600;
        }

        .input-summary {
            background-color: rgba(255, 255, 255, 0.8);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        .input-summary h3 {
            font-size: 15px;
            color: var(--text-gray);
            margin-bottom: 10px;
            font-weight: 600;
        }

        .input-row {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            font-size: 15px;
        }

        .input-label {
            color: var(--text-light);
        }

        .input-value {
            color: var(--text-dark);
            font-weight: 600;
        }

        .result-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px 10px;
            flex: 1;
            margin-bottom: 20px;
        }

        .result-item {
            display: flex;
            flex-direction: column;
            padding: 10px 8px;
            background-color: rgba(255, 255, 255, 0.6);
            border-radius: 6px;
        }

        .result-label {
            color: var(--text-light);
            font-size: 14px;
            margin-bottom: 4px;
        }

        .result-value {
            color: var(--text-dark);
            font-weight: 600;
            font-size: 16px;
        }

        .total-container {
            grid-column: 1 / -1;
            padding-top: 15px;
            border-top: 2px solid rgba(49, 130, 206, 0.1);
            margin-top: 10px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .total-item {
            text-align: center;
            padding: 10px;
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 8px;
        }

        .highlight {
            color: var(--secondary);
            font-size: 18px;
            font-weight: 700;
        }

        .back-btn {
            background: linear-gradient(135deg, #718096, #4a5568);
            margin-top: 15px;
            display: none;
        }

        .disclaimer {
            margin-top: 15px;
            text-align: center;
            font-size: 13px;
            color: var(--text-light);
            padding: 8px 0;
        }

        @media (max-width: 375px) {
            body {
                padding: 8px;
            }
            .calculator {
                padding: 15px 10px;
            }
            .result {
                min-height: 65vh;
                padding: 15px 10px;
            }
            input, select {
                padding: 10px 8px;
            }
            button {
                padding: 12px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="calculator">
        <h1>综合收益计算器</h1>
        
        <!-- 表单区域：默认显示 -->
        <div class="form-container" id="formContainer">
            <div class="form-group">
                <label for="amount">存款金额（元）</label>
                <input type="number" id="amount" placeholder="请输入存款金额，例如：100000" min="10000" required>
            </div>
            
            <div class="form-group">
                <label for="period">存款期限</label>
                <select id="period" required>
                    <option value="1">一年期</option>
                    <option value="2">二年期</option>
                    <option value="3">三年期</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="customerLevel">客户级别</label>
                <select id="customerLevel" required>
                    <option value="normal">普通客户</option>
                    <option value="vip">贵宾客户</option>
                    <option value="gold">黄金客户</option>
                    <option value="platinum">白金客户</option>
                    <option value="diamond">钻石客户</option>
                    <option value="private">私行客户</option>
                </select>
            </div>
            
            <button id="calculateBtn">计算综合收益</button>
        </div>
        
        <!-- 结果区域：默认隐藏 -->
        <div class="result" id="result">
            <div class="result-content">
                <h2>计算结果</h2>
                
                <div class="input-summary" id="inputSummary">
                    <h3>输入信息</h3>
                    <div class="input-row">
                        <span class="input-label">存款金额：</span>
                        <span class="input-value" id="summaryAmount"></span>
                    </div>
                    <div class="input-row">
                        <span class="input-label">存款期限：</span>
                        <span class="input-value" id="summaryPeriod"></span>
                    </div>
                    <div class="input-row">
                        <span class="input-label">客户级别：</span>
                        <span class="input-value" id="summaryLevel"></span>
                    </div>
                    <div class="input-row">
                        <span class="input-label">存款利率：</span>
                        <span class="input-value" id="summaryRate"></span>
                    </div>
                </div>
                
                <div class="result-grid">
                    <div class="result-item">
                        <span class="result-label">存款本金（元）</span>
                        <span class="result-value" id="principal"></span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">存款利息（元）</span>
                        <span class="result-value" id="baseInterest"></span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">积分回馈活动（元）</span>
                        <span class="result-value" id="activity1"></span>
                    </div>
                    <div class="result-item">
                        <span class="result-label">资产提升活动（元）</span>
                        <span class="result-value" id="activity2"></span>
                    </div>
                    <!-- 新增：每万元积分回馈 -->
                    <div class="result-item">
                        <span class="result-label">每万元积分</span>
                        <span class="result-value" id="perWanQinbei"></span>
                    </div>
                    <!-- 新增：每万元返现金额 -->
                    <div class="result-item">
                        <span class="result-label">每万元前置</span>
                        <span class="result-value" id="perWanReward"></span>
                    </div>
                    
                    <div class="total-container">
                        <div class="total-item">
                            <span class="result-label">总收益（元）</span>
                            <span class="result-value highlight" id="totalProfit"></span>
                        </div>
                        <div class="total-item">
                            <span class="result-label">综合年利率</span>
                            <span class="result-value highlight" id="totalRate"></span>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="result-footer">
                <button class="back-btn" id="backBtn">返回重新计算</button>
                <div class="disclaimer">*仅限内部使用，结果仅供参考*</div>
            </div>
        </div>
    </div>

    <script>
        // DOM元素
        const calculateBtn = document.getElementById('calculateBtn');
        const backBtn = document.getElementById('backBtn');
        const formContainer = document.getElementById('formContainer');
        const resultContainer = document.getElementById('result');
        
        // 监听事件
        calculateBtn.addEventListener('click', calculateProfit);
        backBtn.addEventListener('click', resetCalculator);

        // 客户级别配置（保持原有配置）
        const customerConfig = {
            normal: { name: '普通客户', rate1: 1.4, rate2: 1.5, rate3: 1.8 },
            vip: { name: '贵宾客户', rate1: 1.4, rate2: 1.5, rate3: 1.8 },
            gold: { name: '黄金客户', rate1: 1.4, rate2: 1.5, rate3: 1.8 },
            platinum: { name: '白金客户', rate1: 1.4, rate2: 1.5, rate3: 1.8 },
            diamond: { name: '钻石客户', rate1: 1.4, rate2: 1.5, rate3: 1.8 },
            private: { name: '私行客户', rate1: 1.4, rate2: 1.5, rate3: 1.8 }
        };

        // 核心计算函数
        function calculateProfit() {
            // 获取输入值
            const amount = parseFloat(document.getElementById('amount').value) || 0;
            const period = parseInt(document.getElementById('period').value);
            let customerLevel = document.getElementById('customerLevel').value; // 获取用户选择的客户级别
            const levelName = customerConfig[customerLevel].name;
            
            // 期限名称和对应利率
            let periodName = '';
            let originalRate = 0;
            switch(period) {
                case 1:
                    periodName = '一年期';
                    originalRate = customerConfig[customerLevel].rate1;
                    break;
                case 2:
                    periodName = '二年期';
                    originalRate = customerConfig[customerLevel].rate2;
                    break;
                case 3:
                    periodName = '三年期';
                    originalRate = customerConfig[customerLevel].rate3;
                    break;
            }

            // 验证输入
            if (amount < 10000) {
                alert('存款金额不能低于1万元，请重新输入！');
                return;
            }

            // 1. 隐藏表单区域
            formContainer.classList.add('collapsed');
            
            // 2. 反显输入内容
            document.getElementById('summaryAmount').textContent = amount.toLocaleString('zh-CN', {minimumFractionDigits: 2});
            document.getElementById('summaryPeriod').textContent = periodName;
            document.getElementById('summaryLevel').textContent = levelName;
            document.getElementById('summaryRate').textContent = originalRate + '%';

            // 3. 计算各部分收益（关键修复：传入用户选择的customerLevel，而非固定normal）
            const {activity1Profit, qinbeiPerWan} = calculateActivity1(amount); 
            const baseInterest = calculateBaseInterest(amount, period, customerLevel); // 修复1：使用用户选择的级别
            const {activity2Profit, rewardPerWan} = calculateActivity2(amount, period, customerLevel); // 修复2：使用用户选择的级别
            
            // 总收益和综合利率
            const totalProfit = activity1Profit + baseInterest + activity2Profit;
            const totalRate = (totalProfit / amount / period) * 100;

            // 4. 格式化显示结果
            const formatOptions = { 
                minimumFractionDigits: 2, 
                maximumFractionDigits: 2,
                useGrouping: true 
            };
            
            document.getElementById('principal').textContent = amount.toLocaleString('zh-CN', formatOptions);
            document.getElementById('activity1').textContent = activity1Profit.toLocaleString('zh-CN', formatOptions);
            document.getElementById('activity2').textContent = activity2Profit.toLocaleString('zh-CN', formatOptions);
            document.getElementById('baseInterest').textContent = baseInterest.toLocaleString('zh-CN', formatOptions);
            document.getElementById('totalProfit').textContent = totalProfit.toLocaleString('zh-CN', formatOptions);
            document.getElementById('totalRate').textContent = totalRate.toFixed(4) + '%';
            
            // 显示新增的每万元数据
            document.getElementById('perWanQinbei').textContent = qinbeiPerWan + ' 秦贝';
            document.getElementById('perWanReward').textContent = rewardPerWan.toLocaleString('zh-CN', {minimumFractionDigits: 2}) + ' 元';
            
            // 5. 显示结果区域和返回按钮
            resultContainer.style.display = 'flex';
            backBtn.style.display = 'block';
            
            // 平滑滚动到结果区域
            resultContainer.scrollIntoView({ behavior: 'smooth' });
        }

        /**
         * 重置计算器（返回重新计算）
         */
        function resetCalculator() {
            // 1. 显示表单区域
            formContainer.classList.remove('collapsed');
            
            // 2. 隐藏结果区域和返回按钮
            resultContainer.style.display = 'none';
            backBtn.style.display = 'none';
            
            // 3. 清空输入框
            document.getElementById('amount').value = '';
            
            // 4. 滚动到表单顶部
            formContainer.scrollIntoView({ behavior: 'smooth' });
        }

        /**
         * 计算积分回馈活动收益
         * @returns {object} 包含总收益和每万元秦贝数
         */
        function calculateActivity1(amount) {
            const tenThousand = amount / 10000;
            let qinbeiPerWan = 0;

            if (amount >= 10000 && amount < 50000) {
                qinbeiPerWan = 1080;
            } else if (amount >= 50000 && amount < 200000) {
                qinbeiPerWan = 1440;
            } else if (amount >= 200000 && amount < 500000) {
                qinbeiPerWan = 1620;
            } else if (amount >= 500000) {
                qinbeiPerWan = 1800;
            }

            const totalQinbei = tenThousand * qinbeiPerWan;
            const activity1Profit = totalQinbei / 100;
            
            return {activity1Profit, qinbeiPerWan};
        }

        /**
         * 计算基础利息（恢复原有逻辑，使用传入的客户级别）
         */
        function calculateBaseInterest(amount, period, level) {
            let rate = 0;
            switch(period) {
                case 1:
                    rate = customerConfig[level].rate1 / 100; // 使用传入的级别
                    break;
                case 2:
                    rate = customerConfig[level].rate2 / 100; // 使用传入的级别
                    break;
                case 3:
                    rate = customerConfig[level].rate3 / 100; // 使用传入的级别
                    break;
            }
            return amount * rate * period;
        }

        /**
         * 计算资产提升回馈收益（按客户级别区分规则）
         * @returns {object} 包含总收益和每万元返现数
         */
        function calculateActivity2(amount, period, level) {
            const tenThousand = amount / 10000;
            let rewardPerWan = 0;

            // 按客户级别区分返现规则（恢复原有逻辑）
            switch(level) {
                case 'normal': // 普通客户
                    if (period === 1) { 
                        if (amount >= 100000 && amount < 500000) rewardPerWan = 20;
                        else if (amount >= 500000 && amount < 3000000) rewardPerWan = 35;
                        else if (amount >= 3000000) rewardPerWan = 40;
                    }
           	   if (period === 3) { 
                	       if (amount >= 2000000 && amount < 3000000) rewardPerWan = 15;
                  	          else if (amount >= 3000000) rewardPerWan = 30;
        	  }
 		break;
                case 'vip': // 贵宾客户
                  if (period === 1) { 
                        if (amount >= 100000 && amount < 500000) rewardPerWan = 20;
                        else if (amount >= 500000 && amount < 3000000) rewardPerWan = 35;
                        else if (amount >= 3000000) rewardPerWan = 40;
                    }
                       if (period === 3) { 
                	       if (amount >= 2000000 && amount < 3000000) rewardPerWan = 15;
                  	          else if (amount >= 3000000) rewardPerWan = 30;
        	   }
                    break;
                case 'gold': // 黄金客户
                    if (period === 1) { 
                        if (amount >= 100000 && amount < 500000) rewardPerWan = 20;
                        else if (amount >= 500000 && amount < 3000000) rewardPerWan = 35;
                        else if (amount >= 3000000) rewardPerWan = 40;
                    }
 		  if (period === 3) { 
                	       if (amount >= 2000000 && amount < 3000000) rewardPerWan = 15;
                  	          else if (amount >= 3000000) rewardPerWan = 30;
        	  }
                    break;
                case 'platinum': // 白金客户
		  if (period === 1) { 
                        if (amount  < 3000000) rewardPerWan = 35;
                        else if (amount >= 3000000) rewardPerWan = 40;
                    }
		    if (period === 3) { 
                	       if (amount >= 2000000 && amount < 3000000) rewardPerWan = 15;
                  	          else if (amount >= 3000000) rewardPerWan = 30;
        	  }
                    break;
                case 'diamond': // 钻石客户
                      if (period === 1) { 
                        if ( amount < 3000000) rewardPerWan = 35;
                        else if (amount >= 3000000) rewardPerWan = 40;
                    }
		   if (period === 3) { 
                	       if (amount >= 2000000 && amount < 3000000) rewardPerWan = 15;
                  	          else if (amount >= 3000000) rewardPerWan = 30;
        	  }
                    break;
                case 'private': // 私行客户
                      if (period === 1) { 
                        if (amount < 3000000) rewardPerWan = 40;
                        else if (amount >= 3000000) rewardPerWan = 40;
                    }
		   if (period === 3) { 
                	       if (amount >= 2000000 && amount < 3000000) rewardPerWan = 15;
                  	          else if (amount >= 3000000) rewardPerWan = 30;
        	  }
                    break;
            }



            const activity2Profit = tenThousand * rewardPerWan;
            return {activity2Profit, rewardPerWan};
        }

        // 支持回车键触发计算
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !formContainer.classList.contains('collapsed')) {
                calculateProfit();
            }
        });
    </script>
</body>
</html>
